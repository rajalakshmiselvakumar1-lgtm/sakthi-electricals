<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A2540" />
    <title>Sakthi Electricals ERP</title>
    <meta name="description" content="Premium ERP for electrical retail businesses — billing, inventory, customers, suppliers and reports." />

    <!-- Preconnect to speed up font + Firebase handshakes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!--
      Inline critical CSS for the splash/loading screen so the first paint
      (before React + the JS bundle finish loading) is instant and on-brand,
      instead of a blank white page.
    -->
    <style>
      html, body, #root { height: 100%; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #F8FAFC;
        font-family: 'Inter', system-ui, sans-serif;
      }
      #app-boot-splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 14px;
        background: #0A2540;
        z-index: 9999;
      }
      #app-boot-splash .mark {
        width: 52px; height: 52px; border-radius: 14px;
        background: linear-gradient(135deg, #C89B3C, #E0B85C);
        display: flex; align-items: center; justify-content: center;
        font-size: 26px; font-weight: 800; color: #0A2540;
        font-family: 'Plus Jakarta Sans', sans-serif;
        box-shadow: 0 8px 24px rgba(200, 155, 60, 0.35);
      }
      #app-boot-splash .name {
        color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700; font-size: 15px; letter-spacing: 0.2px;
      }
      #app-boot-splash .bar {
        width: 140px; height: 3px; border-radius: 99px; overflow: hidden;
        background: rgba(255,255,255,0.12);
      }
      #app-boot-splash .bar-fill {
        height: 100%; width: 40%; border-radius: 99px;
        background: #C89B3C;
        animation: bootbar 1.1s ease-in-out infinite;
      }
      @keyframes bootbar {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Static boot splash, removed by App.jsx once React has mounted -->
      <div id="app-boot-splash">
        <div class="mark">⚡</div>
        <div class="name">Sakthi Electricals</div>
        <div class="bar"><div class="bar-fill"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
